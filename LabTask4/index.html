// Task Fifth

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Display of selected Text using onSelect Event</title>
</head>
<body>

    <h2>Display of selected Text using onSelect Event</h2>

    <label>Select Text </label>
    <input type="text" id="inputBox" size="30" placeholder="Type then select text...">

    <br><br>

    <div id="displayBox" style="width:200px; height:200px; background-color:cyan; font-size:28px; font-weight:bold; color:blue; padding:10px;">
    </div>

    <script src="script.js"></script>
</body>
</html>
